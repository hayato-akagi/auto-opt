version: "3.9"

services:
  optics-sim-kraken:
    build: ./services/optics-sim
    container_name: optics-sim-kraken
    ports:
      - "9001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  optics-sim-simple:
    build: ./services/simple-optics-sim
    container_name: optics-sim-simple
    ports:
      - "9011:8000"
    environment:
      - CAMERA_WIDTH_PX=640
      - CAMERA_HEIGHT_PX=480
      - CAMERA_FOV_WIDTH_MM=1.0
      - CAMERA_FOV_HEIGHT_MM=1.0
      - MAGNIFICATION=50.0
      - DEFOCUS_COEFFICIENT=10.0
      - TILT_SENSITIVITY_X=0.1
      - TILT_SENSITIVITY_Y=0.1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  recipe-service:
    build: ./services/recipe-service
    ports:
      - "9002:8002"
    volumes:
      - results-data:/app/data
    environment:
      - OPTICS_SIM_KRAKEN_URL=http://optics-sim-kraken:8000
      - OPTICS_SIM_SIMPLE_URL=http://optics-sim-simple:8000
      - POSITION_SERVICE_URL=http://position-service:8004
      - BOLT_SERVICE_URL=http://bolt-service:8005
      - DOWNSTREAM_TIMEOUT_SEC=30
    depends_on:
      optics-sim-kraken:
        condition: service_healthy
      optics-sim-simple:
        condition: service_healthy
      position-service:
        condition: service_healthy
      bolt-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  position-service:
    build: ./services/position-service
    ports:
      - "9004:8004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  bolt-service:
    build: ./services/bolt-service
    ports:
      - "9005:8005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  streamlit-app:
    build: ./services/streamlit-app
    ports:
      - "9501:8501"
    environment:
      - RECIPE_SERVICE_URL=http://recipe-service:8002
      - SIMPLE_CONTROLLER_URL=http://simple-controller:8003
    depends_on:
      recipe-service:
        condition: service_healthy
    volumes:
      - results-data:/app/data:ro

  simple-controller:
    build: ./services/simple-controller
    ports:
      - "9003:8003"
    environment:
      - RECIPE_SERVICE_URL=http://recipe-service:8002
      - DOWNSTREAM_TIMEOUT_SEC=30
    depends_on:
      recipe-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  results-data:
