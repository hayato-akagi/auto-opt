version: "3.9"

services:
  optics-sim-kraken:
    build: ./services/optics-sim
    container_name: optics-sim-kraken
    ports:
      - "9001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  optics-sim-simple:
    build: ./services/simple-optics-sim
    container_name: optics-sim-simple
    ports:
      - "9011:8000"
    environment:
      - CAMERA_WIDTH_PX=640
      - CAMERA_HEIGHT_PX=480
      - CAMERA_FOV_WIDTH_MM=1.0
      - CAMERA_FOV_HEIGHT_MM=1.0
      - MAGNIFICATION=50.0
      - DEFOCUS_COEFFICIENT=10.0
      - TILT_SENSITIVITY_X=0.1
      - TILT_SENSITIVITY_Y=0.1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  recipe-service:
    build: ./services/recipe-service
    ports:
      - "9002:8002"
    volumes:
      - results-data:/app/data
    environment:
      - OPTICS_SIM_KRAKEN_URL=http://optics-sim-kraken:8000
      - OPTICS_SIM_SIMPLE_URL=http://optics-sim-simple:8000
      - POSITION_SERVICE_URL=http://position-service:8004
      - BOLT_SERVICE_URL=http://bolt-service:8005
      - DOWNSTREAM_TIMEOUT_SEC=30
    depends_on:
      optics-sim-kraken:
        condition: service_healthy
      optics-sim-simple:
        condition: service_healthy
      position-service:
        condition: service_healthy
      bolt-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  position-service:
    build: ./services/position-service
    ports:
      - "9004:8004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  bolt-service:
    build: ./services/bolt-service
    ports:
      - "9005:8005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  streamlit-app:
    build: ./services/streamlit-app
    ports:
      - "9501:8501"
    environment:
      - RECIPE_SERVICE_URL=http://recipe-service:8002
      - SIMPLE_CONTROLLER_URL=http://simple-controller:8003
      - TRAINER_SERVICE_URL=http://trainer:9008
      - MODEL_STORE_SERVICE_URL=http://model-store:9009
      - AI_CONTROLLER_SERVICE_URL=http://ai-controller:9006
      - LSTM_CONTROLLER_SERVICE_URL=http://lstm-controller:9012
      - COLLECTION_ORCHESTRATOR_SERVICE_URL=http://collection-orchestrator:9007
    depends_on:
      recipe-service:
        condition: service_healthy
      simple-controller:
        condition: service_healthy
      ai-controller:
        condition: service_healthy
      collection-orchestrator:
        condition: service_healthy
      trainer:
        condition: service_healthy
      model-store:
        condition: service_healthy
    volumes:
      - results-data:/app/data:ro

  simple-controller:
    build: ./services/simple-controller
    ports:
      - "9003:8003"
    environment:
      - RECIPE_SERVICE_URL=http://recipe-service:8002
      - DOWNSTREAM_TIMEOUT_SEC=30
    depends_on:
      recipe-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ai-controller:
    build:
      context: ./services/ai-controller
      dockerfile: Dockerfile.cpu
    ports:
      - "9006:9006"
    environment:
      - RECIPE_SERVICE_URL=http://recipe-service:8002
      - MODEL_STORE_URL=http://model-store:9009
      - DOWNSTREAM_TIMEOUT_SEC=30
      - DEFAULT_MODEL_TYPE=baseline_only
    depends_on:
      recipe-service:
        condition: service_healthy
      model-store:
        condition: service_healthy
    volumes:
      - models-data:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9006/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  collection-orchestrator:
    build: ./services/collection-orchestrator
    ports:
      - "9007:9007"
    environment:
      - SIMPLE_CONTROLLER_URL=http://simple-controller:8003
      - AI_CONTROLLER_URL=http://ai-controller:9006
      - ADAPTIVE_CONTROLLER_URL=http://adaptive-controller:8010
      - LSTM_CONTROLLER_URL=http://lstm-controller:9012
      - TRAINER_URL=http://trainer:9008
      - RECIPE_SERVICE_URL=http://recipe-service:8002
      - DOWNSTREAM_TIMEOUT_SEC=30
      - MAX_WORKERS=4
    depends_on:
      simple-controller:
        condition: service_healthy
      ai-controller:
        condition: service_healthy
      adaptive-controller:
        condition: service_healthy
      lstm-controller:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9007/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  model-store:
    build: ./services/model-store
    ports:
      - "9009:9009"
    volumes:
      - models-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9009/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  trainer:
    build:
      context: ./services/trainer
      dockerfile: Dockerfile.cpu
    ports:
      - "9008:9008"
    environment:
      - RECIPE_SERVICE_URL=http://recipe-service:8002
      - MODEL_STORE_URL=http://model-store:9009
      - SIMPLE_CONTROLLER_URL=http://simple-controller:8003
      - AI_CONTROLLER_URL=http://ai-controller:9006
    depends_on:
      recipe-service:
        condition: service_healthy
      model-store:
        condition: service_healthy
      simple-controller:
        condition: service_healthy
      ai-controller:
        condition: service_healthy
    volumes:
      - models-data:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9008/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  lstm-controller:
    build:
      context: ./services/lstm-controller
      dockerfile: Dockerfile.cpu
    ports:
      - "9012:9012"
    environment:
      - RECIPE_SERVICE_URL=http://recipe-service:8002
      - MODEL_STORE_URL=http://model-store:9009
      - DOWNSTREAM_TIMEOUT_SEC=30
      - DEFAULT_MODEL_TYPE=baseline_only
    depends_on:
      recipe-service:
        condition: service_healthy
      model-store:
        condition: service_healthy
    volumes:
      - models-data:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9012/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  adaptive-controller:
    build: ./services/adaptive-controller
    ports:
      - "9010:8010"
    environment:
      - RECIPE_SERVICE_URL=http://recipe-service:8002
      - DOWNSTREAM_TIMEOUT_SEC=30
    depends_on:
      recipe-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  results-data:
  models-data:
